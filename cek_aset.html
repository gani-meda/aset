<!doctype html>
<html>
    <head>
        <title>Cek Aset</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <link href="css/bootstrap.min.css" rel="stylesheet" />
        <script src="js/supabase-js@2.js">

            document.addEventListener("input", function (e) {
                if (e.target.matches("input[type='text'], textarea")) {
                    e.target.value = e.target.value.toUpperCase()
                }
            })
        </script>
        <style>
            input[type="text"],
            textarea {
                text-transform: uppercase;
            }
        </style>
    </head>
    <body class="bg-light">
        <nav class="navbar navbar-dark bg-dark">
            <div class="container-fluid">
                <span class="navbar-brand">Cek Aset</span>
                <a href="home.html" class="btn btn-secondary btn-sm">Kembali</a>
            </div>
        </nav>

        <div class="container py-4">
            <!-- Form -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Equipment Number</label>
                        <input type="text" id="equip" class="form-control" placeholder="Masukkan Equipment Number" />
                    </div>
                    <button onclick="cekAset()" class="btn btn-primary w-100">Cek</button>
                </div>
            </div>

            <!-- Hasil -->
            <div id="hasil"></div>
        </div>

        <script>
            const supabaseUrl = "https://jtitwiqhgojnspaommhq.supabase.co";
            const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0aXR3aXFoZ29qbnNwYW9tbWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTExNjksImV4cCI6MjA4Nzk4NzE2OX0.BP8y61XSPGSveuQeNAcubh1DE3g-wFtSQF0KxqdZeBk";

            const { createClient } = supabase;
            const db = createClient(supabaseUrl, supabaseKey);

            // Proteksi login
            document.addEventListener("DOMContentLoaded", function () {
                const user = localStorage.getItem("loginUser");
                if (!user) {
                    window.location.replace("index.html");
                }
            });

            async function cekAset() {
                const equipInput = document.getElementById("equip").value.trim();
                const hasilDiv = document.getElementById("hasil");

                if (!equipInput) {
                    alert("Equipment Number wajib diisi");
                    return;
                }

                hasilDiv.innerHTML = `<div class="alert alert-info">Mencari data...</div>`;

                const { data, error } = await db
                    .from("asset")
                    .select("equip, deskripsi, tipe, nama_user, tim, deletion, foto_fisik, foto_sistem")
                    .eq("equip", equipInput)
                    .eq("deletion", "0")
                    .single();

                if (error || !data) {
                    hasilDiv.innerHTML = `
                        <div class="alert alert-warning">
                            Data tidak ditemukan
                        </div> `;
                    return;
                }

                // Tampilkan dalam bentuk form
                hasilDiv.innerHTML = `
        <div class="card shadow-sm border-0">
            <div class="card-body">

                <div class="mb-3">
                    <label class="form-label">Equipment</label>
                    <input type="text" id="equip_edit" class="form-control" value="${data.equip}" disabled>
                </div>

                <div class="mb-3">
                    <label class="form-label">Deskripsi</label>
                    <input type="text" id="deskripsi_edit" class="form-control" value="${data.deskripsi ?? ""}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipe</label>
                    <input type="text" id="tipe_edit" class="form-control" value="${data.tipe ?? ""}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Nama User</label>
                    <input type="text" id="nama_user_edit" class="form-control" value="${data.nama_user ?? ""}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tim</label>
                    <input type="text" id="tim_edit" class="form-control" value="${data.tim ?? ""}">
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Status</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="deletion_edit" 
                            value="0" ${data.deletion === "0" ? "checked" : ""}>
                        <label class="form-check-label">Aktif</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="deletion_edit" 
                            value="1" ${data.deletion === "1" ? "checked" : ""}>
                        <label class="form-check-label">Delete</label>
                    </div>
                </div>

  <hr>

<label class="fw-bold">Foto Fisik</label>

<video id="camera_fisik" autoplay playsinline 
       class="w-100 border rounded mb-2"></video>

<img id="preview_fisik" class="img-fluid border rounded mb-2"/>

<div class="d-flex gap-2 mb-3">
    <button type="button" onclick="startCamera('fisik')" 
            class="btn btn-primary w-50">
        Buka Kamera
    </button>

    <button type="button" onclick="takePhoto('fisik')" 
            class="btn btn-warning w-50">
        Ambil Foto
    </button>
</div>


<label class="fw-bold">Foto Sistem</label>

<video id="camera_sistem" autoplay playsinline 
       class="w-100 border rounded mb-2"></video>

<img id="preview_sistem" class="img-fluid border rounded mb-2"/>

<div class="d-flex gap-2 mb-3">
    <button type="button" onclick="startCamera('sistem')" 
            class="btn btn-primary w-50">
        Buka Kamera
    </button>

    <button type="button" onclick="takePhoto('sistem')" 
            class="btn btn-warning w-50">
        Ambil Foto
    </button>
</div>

                <button onclick="updateAset()" class="btn btn-success w-100">
                    Update Data
                </button>

                <div id="updateMessage" class="mt-3"></div>

            </div>
        </div>
    `;

                if (data.foto_fisik) {
                    const { data: urlData } = db.storage.from("aset-foto").getPublicUrl(data.foto_fisik);
                    document.getElementById("preview_fisik").src = urlData.publicUrl;
                }if (data.foto_sistem) {
                    const { data: urlData } = db.storage.from("aset-foto").getPublicUrl(data.foto_sistem);
                    document.getElementById("preview_sistem").src = urlData.publicUrl;
                }    




            }

            function upper(id) {
                return document.getElementById(id).value.toUpperCase();
            }

            async function updateAset() {
                const equip = upper("equip_edit");
                const deskripsi = upper("deskripsi_edit");
                const tipe = upper("tipe_edit");
                const nama_user = upper("nama_user_edit");
                const tim = upper("tim_edit");

const now = new Date()
const pad = (n) => n.toString().padStart(2,'0')

const tanggal =
    now.getFullYear() +
    pad(now.getMonth()+1) +
    pad(now.getDate()) +
    pad(now.getHours()) +
    pad(now.getMinutes()) +
    pad(now.getSeconds())

let namaFotoFisik = null
let namaFotoSistem = null


// upload foto fisik
if (fotoFisik) {

    namaFotoFisik = `${equip}_${tanggal}_fisik.jpg`

    await db.storage
        .from("aset-foto")
        .upload(namaFotoFisik, fotoFisik, { upsert: true })
}


// upload foto sistem
if (fotoSistem) {

    namaFotoSistem = `${equip}_${tanggal}_sistem.jpg`

    await db.storage
        .from("aset-foto")
        .upload(namaFotoSistem, fotoSistem, { upsert: true })
}


const updateData = {
    deskripsi,
    tipe,
    nama_user,
    tim
}

if (namaFotoFisik) updateData.foto_fisik = namaFotoFisik
if (namaFotoSistem) updateData.foto_sistem = namaFotoSistem


await db
    .from("asset")
    .update(updateData)
    .eq("equip", equip)
            
const msg = document.getElementById("updateMsg");

if (error) {

    msg.innerHTML = `
    <div class="alert alert-danger">
        ${error.message}
    </div>`;

} else {

    msg.innerHTML = `
    <div class="alert alert-success">
        Data berhasil diupdate
    </div>`;

}



}

            let fotoFisik = null
let fotoSistem = null
let stream = null
            
async function startCamera(tipe) {

    if (stream) stopCamera()

    try {

        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" } },
            audio: false
        })

        const video = document.getElementById(`camera_${tipe}`)
        video.srcObject = stream

    } catch (err) {
        alert("Tidak bisa akses kamera")
    }
}

function takePhoto(tipe) {

    const video = document.getElementById(`camera_${tipe}`)
    const canvas = document.createElement("canvas")

    canvas.width = video.videoWidth
    canvas.height = video.videoHeight

    const ctx = canvas.getContext("2d")
    ctx.drawImage(video, 0, 0)

    const imageData = canvas.toDataURL("image/jpeg", 0.8)

    document.getElementById(`preview_${tipe}`).src = imageData

    fetch(imageData)
        .then(res => res.blob())
        .then(blob => {

            const file = new File([blob], `${tipe}.jpg`, {
                type: "image/jpeg"
            })

            if (tipe === "fisik") {
                fotoFisik = file
            } else {
                fotoSistem = file
            }

        })

    stopCamera()
}

function stopCamera() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop())
        stream = null
    }
}




        </script>
    </body>
</html>
