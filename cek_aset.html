<!doctype html>
<html>
    <head>
        <title>Cek Aset</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <link href="css/bootstrap.min.css" rel="stylesheet" />
        <script src="js/supabase-js@2.js">

            document.addEventListener("input", function (e) {
                if (e.target.matches("input[type='text'], textarea")) {
                    e.target.value = e.target.value.toUpperCase()
                }
            })
        </script>
        <style>
            input[type="text"],
            textarea {
                text-transform: uppercase;
            }
        </style>
    </head>
    <body class="bg-light">
        <nav class="navbar navbar-dark bg-dark">
            <div class="container-fluid">
                <span class="navbar-brand">Cek Aset</span>
                <a href="home.html" class="btn btn-secondary btn-sm">Kembali</a>
            </div>
        </nav>

        <div class="container py-4">
            <!-- Form -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Equipment Number</label>
                        <input type="text" id="equip" class="form-control" placeholder="Masukkan Equipment Number" />
                    </div>

                    <button onclick="cekAset()" class="btn btn-primary w-100">Cek</button>
                </div>
            </div>

            <!-- Hasil -->
            <div id="hasil"></div>
        </div>

        <script>
            const supabaseUrl = "https://jtitwiqhgojnspaommhq.supabase.co";
            const supabaseKey =
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0aXR3aXFoZ29qbnNwYW9tbWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTExNjksImV4cCI6MjA4Nzk4NzE2OX0.BP8y61XSPGSveuQeNAcubh1DE3g-wFtSQF0KxqdZeBk";

            const { createClient } = supabase;
            const db = createClient(supabaseUrl, supabaseKey);

            // Proteksi login
            document.addEventListener("DOMContentLoaded", function () {
                const user = localStorage.getItem("loginUser");
                if (!user) {
                    window.location.replace("index.html");
                }
            });

            async function cekAset() {
                const equipInput = document.getElementById("equip").value.trim();
                const hasilDiv = document.getElementById("hasil");

                if (!equipInput) {
                    alert("Equipment Number wajib diisi");
                    return;
                }

                hasilDiv.innerHTML = `
        <div class="alert alert-info">Mencari data...</div>
    `;

                const { data, error } = await db
                    .from("aset")
                    .select("id_aset, equip, deskripsi, tipe, nama_user, tim, deletion, foto")
                    .eq("equip", equipInput)
                    .eq("deletion", "0")
                    .single();

                if (error || !data) {
                    hasilDiv.innerHTML = `
            <div class="alert alert-warning">
                Data tidak ditemukan
            </div>
        `;
                    return;
                }

                // Tampilkan dalam bentuk form
                hasilDiv.innerHTML = `
        <div class="card shadow-sm border-0">
            <div class="card-body">

                <input type="hidden" id="id_aset_edit" value="${data.id_aset}">

                <div class="mb-3">
                    <label class="form-label">Equipment</label>
                    <input type="text" id="equip_edit" class="form-control" value="${data.equip}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Deskripsi</label>
                    <input type="text" id="deskripsi_edit" class="form-control" value="${data.deskripsi ?? ""}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipe</label>
                    <input type="text" id="tipe_edit" class="form-control" value="${data.tipe ?? ""}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Nama User</label>
                    <input type="text" id="nama_user_edit" class="form-control" value="${data.nama_user ?? ""}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tim</label>
                    <input type="text" id="tim_edit" class="form-control" value="${data.tim ?? ""}">
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Status</label>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="deletion_edit" 
                            value="0" ${data.deletion === "0" ? "checked" : ""}>
                        <label class="form-check-label">Aktif</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="deletion_edit" 
                            value="1" ${data.deletion === "1" ? "checked" : ""}>
                        <label class="form-check-label">Delete</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Foto Aset</label>

                    <div class="mb-2">
                        <canvas id="canvas" style="display:none;"></canvas>
                        <img id="previewFoto" class="img-fluid rounded border" />
                    </div>

                    <div class="mb-2">
                        <video id="camera" width="100%" autoplay class="border rounded"></video>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" onclick="startCamera()" class="btn btn-primary">
                            Buka Kamera
                        </button>

                        <button type="button" onclick="takePhoto()" class="btn btn-warning">
                            Ambil Foto
                        </button>
                    </div>
                </div>

                <button onclick="updateAset()" class="btn btn-success w-100">
                    Update Data
                </button>

                <div id="updateMessage" class="mt-3"></div>

            </div>
        </div>
    `;

                if (data.foto) {
                    const { data: urlData } = db.storage.from("aset-foto").getPublicUrl(data.foto);

                    document.getElementById("previewFoto").src = urlData.publicUrl;
                }
            }

            function upper(id) {
                return document.getElementById(id).value.toUpperCase();
            }

            async function updateAset() {
                const id_aset = document.getElementById("id_aset_edit").value;
                const equip = upper("equip_edit");
                const deskripsi = upper("deskripsi_edit");
                const tipe = upper("tipe_edit");
                const nama_user = upper("nama_user_edit");
                const tim = upper("tim_edit");

                /*
    const equip = document.getElementById("equip_edit").value
    const deskripsi = document.getElementById("deskripsi_edit").value
    const tipe = document.getElementById("tipe_edit").value
    const nama_user = document.getElementById("nama_user_edit").value
    const tim = document.getElementById("tim_edit").value
    */

                const deletionValue = document.querySelector('input[name="deletion_edit"]:checked').value;

                const messageDiv = document.getElementById("updateMessage");
                messageDiv.innerHTML = `<div class="alert alert-info">Mengupdate data...</div>`;

                let namaFile = null;

                if (fotoFile) {
                    // Ambil equip
                    const equip = document
                        .getElementById("equip_edit")
                        .value
                        .toUpperCase()

                    // Format tanggal YYYYMMDDHHMMSS
                    const now = new Date()

                    const pad = (n) => n.toString().padStart(2, '0')

                    const tanggal =
                        now.getFullYear().toString() +
                        pad(now.getMonth() + 1) +
                        pad(now.getDate()) +
                        pad(now.getHours()) +
                        pad(now.getMinutes()) +
                        pad(now.getSeconds())

                    namaFile = `${equip}_${tanggal}.jpg`

                    const { error: uploadError } = await db.storage.from("aset-foto").upload(namaFile, fotoFile);

                    if (uploadError) {
                        alert("Upload foto gagal: " + uploadError.message);
                        return;
                    }
                }

                const { error } = await db
                    .from("aset")
                    .update({
                        equip,
                        deskripsi,
                        tipe,
                        nama_user,
                        tim,
                        deletion: deletionValue,
                        ...(namaFile && { foto: namaFile }),
                    })
                    .eq("id_aset", id_aset);

                if (error) {
                    messageDiv.innerHTML = `
            <div class="alert alert-danger">
                Update gagal: ${error.message}
            </div>
        `;
                    return;
                }

                messageDiv.innerHTML = `
        <div class="alert alert-success">
            Data berhasil diupdate
        </div>
    `;
            }

            let stream = null;
            let fotoFile = null;
            async function startCamera() {
                if (stream) stopCamera();

                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: { ideal: "environment" },
                        },
                        audio: false,
                    });

                    document.getElementById("camera").srcObject = stream;
                } catch (err) {
                    alert("Tidak bisa akses kamera: " + err.message);
                }
            }

            function stopCamera() {
                if (stream) {
                    stream.getTracks().forEach((track) => track.stop());
                    stream = null;
                }
            }

            function takePhoto() {
                const video = document.getElementById("camera");
                const canvas = document.getElementById("canvas");
                const preview = document.getElementById("previewFoto");

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                const ctx = canvas.getContext("2d");
                ctx.drawImage(video, 0, 0);

                const imageData = canvas.toDataURL("image/jpeg");

                preview.src = imageData;

                // Convert base64 ke file
                fetch(imageData)
                    .then((res) => res.blob())
                    .then((blob) => {
                        fotoFile = new File([blob], "foto_aset.jpg", { type: "image/jpeg" });
                    });
            }
        </script>
    </body>
</html>
