<!doctype html>
<html>
    <head>
        <title>Home</title>
        <!-- WAJIB untuk mobile -->
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link href="css/bootstrap.min.css" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    </head>
    <body class="bg-light">
        <nav class="navbar navbar-dark bg-dark">
            <div class="container-fluid">
                <span class="navbar-brand fs-6 fs-md-5">Dashboard Aset</span>
                <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </nav>
        <div class="container py-4">
            <div class="mb-4">
                <h5 class="fw-bold">Selamat Datang</h5>
                <p id="userLogin" class="text-muted small mb-0"></p>
            </div>
            <div class="row g-3">
                <!-- Cek Aset -->
                <div class="col-6 col-md-4 col-lg-4 mb-3">
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-body text-center p-3">
                            <i class="bi bi-search fs-4 text-primary mb-2"></i>
                            <h6 class="fw-bold mb-1">Cek Aset</h6>
                            <p class="text-muted small mb-2">Lihat informasi aset</p>
                            <a href="cek_aset.html" class="btn btn-primary btn-sm w-100">Masuk</a>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-4 col-lg-4 mb-3">
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-body text-center p-3">
                            <i class="bi bi-aspect-ratio fs-4 text-primary mb-2"></i>
                            <h6 class="fw-bold mb-1">Cek Aset</h6>
                            <p class="text-muted small mb-2">Scan QR Code pada aset.</p>
                            <a href="scan_qr.html" class="btn btn-primary btn-sm w-100">Masuk</a>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-4 col-lg-4 mb-3">
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-body text-center p-3">
                            <i class="bi bi-gear fs-4 text-primary mb-2"></i>
                            <h6 class="fw-bold mb-1">Manajemen Aset</h6>
                            <p class="text-muted small mb-2">Kelola data aset.</p>
                            <a href="manajemen_aset.html" class="btn btn-success btn-sm w-100">Masuk</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const user = localStorage.getItem("loginUser");

                if (!user) {
                    window.location.replace("index.html");
                    return;
                }

                document.getElementById("userLogin").innerText = "Login sebagai: " + user;
            });

            function logout() {
                localStorage.removeItem("loginUser");
                window.location.replace("index.html");
            }
        </script>
    </body>
</html>
