<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <!-- WAJIB untuk mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand fs-6 fs-md-5">Dashboard Aset</span>
        <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container py-4">

    <div class="mb-4">
        <h5 class="fw-bold">Selamat Datang</h5>
        <p id="userLogin" class="text-muted small mb-0"></p>
    </div>

    <div class="row g-3">

        <!-- Cek Aset -->
        <div class="col-12 col-md-6">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body text-center p-4">
                    <i class="bi bi-search display-6 text-primary mb-3"></i>
                    <h6 class="fw-bold">Cek Aset</h6>
                    <p class="text-muted small">
                        Cari dan lihat informasi aset.
                    </p>
                    <a href="cek_aset.html" class="btn btn-primary w-100 btn-sm">
                        Masuk
                    </a>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body d-flex flex-column justify-content-center">
                    <h5 class="card-title">Scan QR Aset</h5>
                    <p class="card-text">Cek aset dengan scan QR Code</p>
                    <a href="scan_qr.html" class="btn btn-dark mt-auto">
                        Buka Menu
                    </a>
                </div>
            </div>
        </div>

        <!-- Manajemen Aset -->
        <div class="col-12 col-md-6">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body text-center p-4">
                    <i class="bi bi-gear display-6 text-success mb-3"></i>
                    <h6 class="fw-bold">Manajemen Aset</h6>
                    <p class="text-muted small">
                        Kelola data aset.
                    </p>
                    <a href="manajemen_aset.html" class="btn btn-success w-100 btn-sm">
                        Masuk
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const user = localStorage.getItem("loginUser")

    if (!user) {
        window.location.replace("index.html")
        return
    }

    document.getElementById("userLogin").innerText = "Login sebagai: " + user
})

function logout() {
    localStorage.removeItem("loginUser")
    window.location.replace("index.html")
}
</script>

</body>
</html>
