<!doctype html>
<html>
    <head>
        <title>Scan QR Aset</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link href="css/bootstrap.min.css" rel="stylesheet" />
        <!-- Supabase CDN -->
        <script src="js/supabase-js@2.js"></script>
        <!-- QR Code Library -->
        <script src="js/html5-qrcode.min.js"></script>
    </head>

    <body class="bg-light">
        <nav class="navbar navbar-dark bg-dark">
            <div class="container-fluid">
                <span class="navbar-brand">Cek Aset</span>
                <a href="home.html" class="btn btn-secondary btn-sm">Kembali</a>
            </div>
        </nav>
        <div class="container py-4">
            <h4 class="text-center mb-3">Scan QR Aset</h4>
            <div id="reader" style="width: 100%"></div>
            <div id="hasilAset" class="mt-4"></div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const SUPABASE_URL = "https://jtitwiqhgojnspaommhq.supabase.co";
                const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0aXR3aXFoZ29qbnNwYW9tbWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTExNjksImV4cCI6MjA4Nzk4NzE2OX0.BP8y61XSPGSveuQeNAcubh1DE3g-wFtSQF0KxqdZeBk";

                const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                let currentId = null;

                function onScanSuccess(decodedText) {
                    html5QrcodeScanner.clear();
                    cekAset(decodedText);
                }

                const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
                html5QrcodeScanner.render(onScanSuccess);

                async function cekAset(equip) {
                    const { data, error } = await db
                        .from("asset")
                        .select("*")
                        .eq("equip", equip)
                        .eq("deletion", "0")
                        .single();

                    if (error || !data) {
                        document.getElementById("hasilAset").innerHTML =
                            `<div class="alert alert-danger">Aset tidak ditemukan</div>`;
                        return;
                    }

                    currentId = data.equip;

            document.getElementById("hasilAset").innerHTML = `
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="mb-2">
                        <label>Equipment</label>
                        <input type="text" id="equip_edit" 
                               class="form-control text-uppercase"
                               value="${data.equip}" readonly>
                    </div>

                    <div class="mb-2">
                        <label>Deskripsi</label>
                        <input type="text" id="deskripsi_edit" 
                               class="form-control text-uppercase"
                               value="${data.deskripsi ?? ""}">
                    </div>

                    <div class="mb-2">
                        <label>Tipe</label>
                        <input type="text" id="tipe_edit" 
                               class="form-control text-uppercase"
                               value="${data.tipe ?? ""}">
                    </div>

                    <div class="mb-2">
                        <label>Nama User</label>
                        <input type="text" id="nama_user_edit" 
                               class="form-control text-uppercase"
                               value="${data.nama_user ?? ""}">
                    </div>

                    <div class="mb-2">
                        <label>Tim</label>
                        <input type="text" id="tim_edit" 
                               class="form-control text-uppercase"
                               value="${data.tim ?? ""}">
                    </div>

                    <hr>
                        <div class="row">
                            <!-- FOTO FISIK -->
                            <label class="fw-bold">Foto Fisik</label>
                            <div class="col-md-6 mb-3">
                                <img id="preview_fisik" class="img-thumbnail mb-2" style="max-width:180px">
                                <video id="camera_fisik" autoplay playsinline class="border rounded mb-2" style="width:180px"></video>
                                <div class="d-flex gap-2">
                                    <button type="button" onclick="startCamera('fisik')" class="btn btn-primary btn-sm w-50"> Kamera </button>
                                    <button type="button" onclick="takePhoto('fisik')" class="btn btn-warning btn-sm w-50"> Ambil </button>
                                </div>
                            </div>
                            <!-- FOTO SISTEM -->
                            <label class="fw-bold">Foto Sistem</label>
                            <div class="col-md-6 mb-3">
                                <img id="preview_sistem" class="img-thumbnail mb-2" style="max-width:180px">
                                <video id="camera_sistem" autoplay playsinline class="border rounded mb-2" style="width:180px"></video>
                                <div class="d-flex gap-2">
                                    <button type="button" onclick="startCamera('sistem')" class="btn btn-primary btn-sm w-50"> Kamera </button>
                                    <button type="button" onclick="takePhoto('sistem')" class="btn btn-warning btn-sm w-50">Ambil</button>
                                </div>
                            </div>
                        </div>
                         <canvas id="canvas" style="display:none"></canvas>

                    <div class="mt-3 d-grid gap-2">
                        <button onclick="updateAset()" class="btn btn-success">
                            Update Data
                        </button>

                        <button onclick="scanUlang()" class="btn btn-secondary">
                            Scan Ulang
                        </button>
                    </div>

                    <div id="updateMsg" class="mt-2"></div>
                </div>
            </div>
        `;

                    if (data.foto_fisik) {
                        const { data: urlData } = db.storage.from("aset-foto").getPublicUrl(data.foto_fisik);
                        document.getElementById("preview_fisik").src = urlData.publicUrl;
                    }if (data.foto_sistem) {
                        const { data: urlData } = db.storage.from("aset-foto").getPublicUrl(data.foto_sistem);
                        document.getElementById("preview_sistem").src = urlData.publicUrl;
                    } 
                }

                window.updateAset = async function () {

                    if (!currentId) return;

                    const deskripsi = document.getElementById("deskripsi_edit").value.toUpperCase();
                    const tipe = document.getElementById("tipe_edit").value.toUpperCase();
                    const nama_user = document.getElementById("nama_user_edit").value.toUpperCase();
                    const tim = document.getElementById("tim_edit").value.toUpperCase();

                    const msg = document.getElementById("updateMsg");
                    msg.innerHTML = `<div class="alert alert-info">Mengupdate...</div>`;

                    const equip = document
                        .getElementById("equip_edit")
                        .value
                        .toUpperCase();

                    const now = new Date();

                    const pad = (n) => n.toString().padStart(2, "0");

                    const tanggal =
                        now.getFullYear() +
                        pad(now.getMonth() + 1) +
                        pad(now.getDate()) +
                        pad(now.getHours()) +
                        pad(now.getMinutes()) +
                        pad(now.getSeconds());

                    let namaFotoFisik = null;
                    let namaFotoSistem = null;

                    // upload foto fisik
                    if (fotoFisik) {
                        namaFotoFisik = `${equip}_${tanggal}_fisik.jpg`;
                        const { error } = await db.storage
                            .from("aset-foto")
                            .upload(namaFotoFisik, fotoFisik, { upsert: true });

                        if (error) {
                            msg.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
                            return;
                        }
                    }

                    // upload foto sistem
                    if (fotoSistem) {
                        namaFotoSistem = `${equip}_${tanggal}_sistem.jpg`;
                        const { error } = await db.storage
                            .from("aset-foto")
                            .upload(namaFotoSistem, fotoSistem, { upsert: true });

                        if (error) {
                            msg.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
                            return;
                        }
                    }

                    const updateData = {
                        deskripsi,
                        tipe,
                        nama_user,
                        tim,
                    };

                    if (namaFotoFisik) updateData.foto_fisik = namaFotoFisik;
                    if (namaFotoSistem) updateData.foto_sistem = namaFotoSistem;

                    const { error } = await db
                        .from("asset")
                        .update(updateData)
                        .eq("equip", currentId);

                    if (error) {
                        msg.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
                        return;
                    }

                    msg.innerHTML = `<div class="alert alert-success">Berhasil update data + foto</div>`;
                };
            });

            let stream = null;
            let fotoFisik = null;
            let fotoSistem = null;
            let kameraAktif = null;

            window.startCamera = async function (tipe) {
                kameraAktif = tipe;
                if (stream) stopCamera();
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { ideal: "environment" } },
                        audio: false,
                    });
                    document.getElementById("camera_" + tipe).srcObject = stream;
                } catch (err) {
                    alert("Tidak bisa akses kamera: " + err.message);
                }
            };

            window.takePhoto = function (tipe) {
                const video = document.getElementById("camera_" + tipe);
                const canvas = document.getElementById("canvas");
                const preview = document.getElementById("preview_" + tipe);

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                const ctx = canvas.getContext("2d");
                ctx.drawImage(video, 0, 0);

                const imageData = canvas.toDataURL("image/jpeg", 0.8);
                preview.src = imageData;
                fetch(imageData)
                    .then((res) => res.blob())
                    .then((blob) => {

                        const file = new File([blob], tipe + ".jpg", {
                            type: "image/jpeg",
                        });

                        if (tipe === "fisik") {
                            fotoFisik = file;
                        }

                        if (tipe === "sistem") {
                            fotoSistem = file;
                        }

                    });
                stopCamera();
            };

            function stopCamera() {
                if (stream) {
                    stream.getTracks().forEach((track) => track.stop());
                    stream = null;
                }
            }

            function scanUlang() {
                // Optional: hentikan kamera kalau masih aktif
                if (typeof stopCamera === "function") {
                    stopCamera();
                }

                // Reset ID kalau ada
                if (typeof currentId !== "undefined") {
                    currentId = null;
                }

                // Redirect ke halaman scan
                window.location.href = "scan_qr.html";
            }
        </script>
    </body>
</html>
