<!DOCTYPE html>
<html>
<head>
    <title>Scan QR Aset</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- QR Code Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body class="bg-light">

<div class="container py-4">

    <h4 class="text-center mb-3">Scan QR Aset</h4>

    <div id="reader" style="width:100%;"></div>

    <div id="hasilAset" class="mt-4"></div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function() {

    const SUPABASE_URL = "https://jtitwiqhgojnspaommhq.supabase.co"
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0aXR3aXFoZ29qbnNwYW9tbWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTExNjksImV4cCI6MjA4Nzk4NzE2OX0.BP8y61XSPGSveuQeNAcubh1DE3g-wFtSQF0KxqdZeBk"

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    function onScanSuccess(decodedText) {

        console.log("QR Terbaca:", decodedText)

        html5QrcodeScanner.clear()

        cekAset(decodedText)
    }

    const html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        {
            fps: 10,
            qrbox: 250
        }
    )

    html5QrcodeScanner.render(onScanSuccess)

    async function cekAset(equip) {

        const { data, error } = await db
            .from("aset")
            .select("*")
            .eq("equip", equip)
            .eq("deletion", "0")
            .single()

        if (error || !data) {
            document.getElementById("hasilAset").innerHTML =
                `<div class="alert alert-danger">Aset tidak ditemukan</div>`
            return
        }

        document.getElementById("hasilAset").innerHTML = `
            <div class="card shadow-sm">
                <div class="card-body">
                    <p><strong>Equipment:</strong> ${data.equip}</p>
                    <p><strong>Deskripsi:</strong> ${data.deskripsi}</p>
                    <p><strong>Tipe:</strong> ${data.tipe}</p>
                    <p><strong>Nama User:</strong> ${data.nama_user}</p>
                    <p><strong>Tim:</strong> ${data.tim}</p>
                </div>
            </div>
        `
    }

})

</script>

</body>
</html>
